<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- ホムラ(継続の炎の精)アプリアイコン。「npm run icon homura」で assets/icon.png に書き出す -->
  <defs>
    <linearGradient id="hOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF5A2C"/>
      <stop offset="1" stop-color="#FF7A3C"/>
    </linearGradient>
    <linearGradient id="hCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD23F"/>
      <stop offset="1" stop-color="#FFF3B0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="#FFF1E6"/>
  <g transform="translate(92 112) scale(4.2)">
    <!-- 火の粉 -->
    <circle cx="42" cy="70" r="4" fill="#FFB25E"/>
    <circle cx="160" cy="62" r="3.5" fill="#FFB25E"/>
    <circle cx="170" cy="130" r="3" fill="#FF8A3C"/>
    <!-- 腕(炎の突起) -->
    <ellipse cx="44" cy="136" rx="9" ry="16" fill="#FF7A3C" transform="rotate(-18 44 136)"/>
    <ellipse cx="156" cy="136" rx="9" ry="16" fill="#FF7A3C" transform="rotate(18 156 136)"/>
    <!-- 外炎 -->
    <path d="M100 18 C126 52 154 82 154 122 C154 164 130 186 100 186 C70 186 46 164 46 122 C46 82 74 52 100 18 Z" fill="url(#hOuter)"/>
    <!-- 内炎 -->
    <path d="M100 78 C116 98 132 112 132 138 C132 164 118 176 100 176 C82 176 68 164 68 138 C68 112 84 98 100 78 Z" fill="url(#hCore)"/>
    <!-- 顔(proud) -->
    <path d="M80 128 Q87 120 94 128" stroke="#FFF" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M106 128 Q113 120 120 128" stroke="#FFF" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M90 146 Q100 156 110 146" stroke="#B33B18" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
